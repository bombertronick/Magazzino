<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cucina ERP V10.2.1 Stable</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a; --primary-hover: #1e293b; --accent: #0ea5e9; --accent-glow: rgba(14, 165, 233, 0.25);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f4f7fb; --card: #ffffff; --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
            --sidebar-w: 280px;
            --shadow-sm: 0 2px 4px rgba(15, 23, 42, 0.02), 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 10px 15px -3px rgba(15, 23, 42, 0.05), 0 4px 6px -4px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 8px 10px -6px rgba(15, 23, 42, 0.04);
            --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;
            --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
            --bezier-smooth: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #050505; --card: #121212; --text: #f8fafc; --text-muted: #94a3b8; --border: #1e1e1e;
            --primary: #1e293b; --primary-hover: #334155;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.6); --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.8);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100dvh; width: 100vw; overflow: hidden; transition: background-color 0.4s var(--bezier-smooth), color 0.4s var(--bezier-smooth); -webkit-font-smoothing: antialiased; }
        body.edit-mode { background: repeating-linear-gradient(45deg, var(--bg), var(--bg) 15px, rgba(245, 158, 11, 0.03) 15px, rgba(245, 158, 11, 0.03) 30px); }
        ::-webkit-scrollbar { width: 5px; height: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 10px; }

        .sidebar { width: var(--sidebar-w); height: 100%; background: var(--primary); color: #fff; display: flex; flex-direction: column; transition: transform 0.4s var(--bezier-smooth); z-index: 1001; position: relative; box-shadow: var(--shadow-lg); flex-shrink: 0; }
        .sidebar-header { padding: calc(28px + var(--safe-top)) 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 16px; }
        .sidebar-logo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(251, 191, 36, 0.8); background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .sidebar-header h1 { font-weight: 800; font-size: 1.15rem; letter-spacing: -0.5px; margin: 0; line-height: 1.2; }
        .sidebar-header h1 span { color: var(--accent); font-size: 0.7rem; background: rgba(14, 165, 233, 0.15); padding: 4px 8px; border-radius: 8px; font-weight: 800; }
        .sidebar-close-btn { display: none; margin-left: auto; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 40px; height: 40px; border-radius: var(--radius-md); cursor: pointer; align-items: center; justify-content: center; transition: 0.3s var(--bezier-smooth); }
        
        .nav-group { padding: 24px 0; flex-grow: 1; overflow-y: auto; }
        .nav-label { padding: 0 28px 12px; font-size: 0.65rem; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-item { padding: 14px 28px; display: flex; align-items: center; gap: 16px; cursor: pointer; color: rgba(255,255,255,0.65); font-weight: 600; font-size: 0.95rem; transition: 0.3s var(--bezier-smooth); position: relative; }
        .nav-item:hover, .nav-item.active { color: #fff; background: rgba(255,255,255,0.05); padding-left: 32px; }
        .nav-item.active { color: var(--accent); font-weight: 700; }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--accent); border-radius: 0 4px 4px 0; }

        main { flex: 1; display: flex; flex-direction: column; height: 100dvh; width: calc(100vw - var(--sidebar-w)); position: relative; }
        .top-bar { height: calc(80px + var(--safe-top)); background: rgba(var(--card), 0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: var(--safe-top) 32px 0; z-index: 10; }
        .view-title { font-weight: 800; font-size: 1.35rem; display: flex; align-items: center; gap: 16px; letter-spacing: -0.5px; }
        .btn-icon { background: var(--bg); border: 1px solid var(--border); color: var(--text); width: 46px; height: 46px; border-radius: var(--radius-md); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s var(--bezier-smooth); font-size: 1.05rem; flex-shrink: 0; }
        .btn-icon:hover { background: var(--card); box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--text-muted); }

        .toolbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; flex-direction: column; gap: 16px; }
        .folders-nav { display: flex; overflow-x: auto; gap: 12px; scrollbar-width: none; }
        .folders-nav::-webkit-scrollbar { display: none; }
        .folder-tab { padding: 12px 24px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; white-space: nowrap; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; transition: 0.3s var(--bezier-smooth); }
        .folder-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: var(--shadow-md); }
        .search-container { display: flex; gap: 12px; width: 100%; position: relative; }
        .search-bar { flex: 1; padding: 14px 16px 14px 48px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 0.95rem; font-weight: 600; transition: 0.3s; width: 100%; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* TABELLE FIXATE */
        .content-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 32px; padding-bottom: 150px; display: flex; flex-direction: column; gap: 32px; }
        @media (min-width: 900px) { .content-scroll { display: grid; grid-template-columns: 1fr 1fr; align-content: start; } .toolbar { flex-direction: row; align-items: center; justify-content: space-between; } }
        
        .card { background: var(--card); border-radius: var(--radius-xl); border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: 0.4s var(--bezier-smooth); display: flex; flex-direction: column; }
        .card-header { padding: 22px 28px; color: white; font-weight: 800; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; position: relative; border-radius: var(--radius-xl) var(--radius-xl) 0 0; }
        
        /* IL FIX DELLO SCROLL ORIZZONTALE */
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        td { padding: 20px 28px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .prod-name { font-weight: 800; font-size: 1.1rem; display: block; margin-bottom: 6px; }
        .prod-meta { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .role-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 100px; color: white; font-weight: 800; }
        .note-input { width: 100%; min-width: 150px; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; font-size: 0.95rem; background: var(--bg); color: var(--text); font-weight: 500; }
        .chk-btn { width: 48px; height: 48px; border-radius: var(--radius-md); border: 2px solid var(--border); background: var(--bg); cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; color: transparent; margin: 0 auto; flex-shrink: 0; }
        .chk-btn.checked { background: var(--success); border-color: var(--success); color: white; transform: scale(1.1) rotate(5deg); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.35); }
        tr.is-done { opacity: 0.4; } tr.is-done .prod-name { text-decoration: line-through; color: var(--success); }
        tr.out-of-schedule { opacity: 0.7; border-left: 4px dashed var(--warning); background: rgba(245, 158, 11, 0.03); }

        .btn-action { border: none; padding: 16px 24px; border-radius: var(--radius-md); font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1rem; width: 100%; transition: 0.3s; }

        /* MODALI */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 36px; padding: 56px 48px; box-shadow: var(--shadow-lg); width: 100%; max-width: 440px; text-align: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: var(--card); width: 100%; max-width: 600px; border-radius: var(--radius-xl); padding: 40px; max-height: 85dvh; overflow-y: auto; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.08); }
        .modal-header { display: flex; align-items: center; gap: 18px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .modal-back-btn { width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--bg); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text); }
        .modal-title { font-weight: 800; font-size: 1.35rem; color: var(--primary); }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; padding: 16px 20px; border: 2px solid var(--border); border-radius: var(--radius-md); font-size: 1.05rem; font-weight: 600; background: var(--bg); color: var(--text); }
        
        .days-matrix { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .day-chip { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--border); display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; background: var(--bg); }
        .day-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        #toast-container { position: fixed; top: calc(20px + var(--safe-top)); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .custom-toast { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 16px 28px; border-radius: 100px; box-shadow: var(--shadow-lg); font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 14px; pointer-events: auto; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -100%; }
            .sidebar.open { left: 0; }
            .sidebar-close-btn { display: flex; }
            .mobile-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; }
            .sidebar.open + .mobile-overlay { display: block; }
            tr { display: flex; flex-wrap: wrap; padding: 20px 0; border-bottom: 1px solid var(--border); }
            td { padding: 6px 28px; border-bottom: none !important; }
            td:nth-child(1) { width: 100% !important; padding-bottom: 16px; }
            td:nth-child(2) { width: 70% !important; }
            td:nth-child(3) { width: 30% !important; display: flex; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-weight: 800; font-size: 1.8rem; margin-bottom: 8px;">Identificazione</h2>
            <div id="auth-profiles-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 40vh; overflow-y: auto; padding: 4px; margin-bottom: 24px;"></div>
            <button class="btn-action" style="background: var(--primary); color: #fff;" onclick="requestManagerLogin()"><i class="fa-solid fa-chess-king"></i> Accesso Manager</button>
        </div>
    </div>
    <div class="modal-overlay" id="modal-profile-pin" style="z-index: 10000;">
        <div class="modal-box" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border-bottom: none; margin-bottom: 0;">
                <div class="modal-back-btn" style="position: absolute; left: 30px;" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div>
            </div>
            <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 8px;" id="auth-role-name">Profilo</h3>
            <input type="password" id="input-profile-pin" style="width: 100%; text-align: center; font-size: 2.2rem; letter-spacing: 18px; padding: 18px; border-radius: var(--radius-md); border: 2px solid var(--border); background: var(--bg); color: var(--text); font-weight: 800;" maxlength="4" placeholder="••••">
            <button class="btn-action" style="background: var(--accent); color: white; margin-top: 28px;" onclick="verifyProfilePin()">Accedi</button>
        </div>
    </div>

    <div class="mobile-overlay" onclick="document.getElementById('sidebar').classList.remove('open')"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="1000049261.png" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'">
            <div>
                <h1>CUCINA ERP <span>v10.2.1</span></h1>
                <div id="active-profile-display" style="font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 700; margin-top: 4px;"><span id="current-user-label">Admin</span></div>
            </div>
            <div class="sidebar-close-btn" onclick="document.getElementById('sidebar').classList.remove('open')"><i class="fa-solid fa-chevron-left"></i></div>
        </div>
        <nav class="nav-group">
            <div class="nav-label">SEDI</div><div id="sedi-menu"></div>
            <div style="margin-top: 32px;" class="nav-label">REPARTI</div><div id="categories-filter-menu"></div>
            <div style="margin-top: 32px;" class="nav-label manager-only">MANAGER</div>
            <div class="nav-item manager-only" onclick="openDashboard()"><i class="fa-solid fa-chart-pie"></i> KPI</div>
            <div class="nav-item manager-only" onclick="generateReport()"><i class="fa-solid fa-clipboard-check"></i> Report</div>
            <div class="nav-item manager-only" onclick="openCloudHub()"><i class="fa-solid fa-cloud-arrow-up"></i> Cloud Hub</div>
            <div class="nav-item manager-only" onclick="openTimeMachine()"><i class="fa-solid fa-clock-rotate-left"></i> Backup</div>
            <div class="nav-item manager-only edit-only" style="display: none; margin-top: 24px;" onclick="openCategoryManager()"><i class="fa-solid fa-layer-group"></i> Reparti</div>
            <div class="nav-item manager-only edit-only" style="display: none;" onclick="openRolesManager()"><i class="fa-solid fa-user-gear"></i> Profili</div>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-action manager-only" style="background: rgba(255,255,255,0.1); color: #fff;" onclick="requestEditMode()" id="sidebar-edit-status">SBLOCCA MODIFICHE</button>
            <button class="btn-action" style="background: rgba(239, 68, 68, 0.15); color: #f87171; margin-top: 10px;" onclick="logout()">LOGOUT</button>
        </div>
    </aside>

    <main>
        <header class="top-bar">
            <div class="view-title">
                <button class="btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars-staggered"></i></button>
                <span id="header-title">Loading...</span>
            </div>
            <div style="display: flex; gap: 14px; align-items: center;">
                <button class="btn-icon" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
                <button class="btn-icon" style="color: var(--danger);" onclick="smartReset()"><i class="fa-solid fa-rotate-left"></i></button>
            </div>
        </header>
        <div class="toolbar">
            <div class="folders-nav" id="folders-menu"></div>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-bar" id="search-input" placeholder="Cerca..." onkeyup="renderContent()">
                <button class="btn-icon" id="btn-show-hidden" onclick="toggleHiddenItems()" style="width: auto; padding: 0 16px; font-weight: 700; font-size: 0.85rem; color: var(--text-muted);">EXTRA</button>
                <button class="btn-icon" id="btn-fifo" onclick="toggleFIFO()" style="width: auto; padding: 0 16px; font-weight: 700; font-size: 0.85rem; color: var(--text-muted);">F.I.F.O.</button>
            </div>
        </div>
        <div class="content-scroll" id="main-content"></div>
    </main>

    <div class="modal-overlay" id="modal-item"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">Editor Prodotto</div></div><div class="input-group"><label>Nome</label><input type="text" id="input-item-name"></div><div class="input-group"><label>Reparto</label><select id="input-item-cat" onchange="toggleItemFields()"></select></div><div class="input-group" style="background: rgba(245, 158, 11, 0.05); padding: 20px; border-radius: var(--radius-md);"><label>Visibilità</label><div class="days-matrix" id="item-days-matrix"><div class="day-chip" data-day="1" onclick="toggleDay(this)">LU</div><div class="day-chip" data-day="2" onclick="toggleDay(this)">MA</div><div class="day-chip" data-day="3" onclick="toggleDay(this)">ME</div><div class="day-chip" data-day="4" onclick="toggleDay(this)">GI</div><div class="day-chip" data-day="5" onclick="toggleDay(this)">VE</div><div class="day-chip" data-day="6" onclick="toggleDay(this)">SA</div><div class="day-chip" data-day="0" onclick="toggleDay(this)">DO</div></div></div><div style="display:flex; gap:20px;" id="wrapper-ls"><div class="input-group" style="flex:1;"><label>Linea (L)</label><input type="text" id="input-item-line"></div><div class="input-group" style="flex:1;"><label>Scorta (S)</label><input type="text" id="input-item-stock"></div></div><div class="input-group" id="wrapper-ideal" style="display:none;"><label>Target Giacenza</label><input type="number" id="input-item-ideal"></div><div style="display:flex; gap:20px;"><div class="input-group" style="flex:1;"><label>Fornitore</label><input type="text" id="input-item-supplier"></div><div class="input-group" style="flex:1;"><label>Costo</label><input type="number" step="0.01" id="input-item-cost"></div></div><div style="display:flex; gap:20px;"><div class="input-group" style="flex:1;"><label>Scadenza</label><input type="date" id="input-item-expiry"></div><div class="input-group" style="flex:1;"><label>Info</label><input type="text" id="input-item-info"></div></div><button class="btn-action" style="background: var(--primary); color: white;" onclick="saveItem()">Salva</button></div></div>
    <div class="modal-overlay" id="modal-cloud"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">Cloud Hub</div></div><div class="input-group"><label>Nome Versione</label><input type="text" id="cloud-version-name"></div><button class="btn-action" style="background: #a855f7; color: white; margin-bottom:20px;" onclick="uploadToCloudHub()">Carica nel Cloud</button><div id="cloud-versions-list"></div></div></div>
    <div class="modal-overlay" id="modal-backup"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">Backup</div></div><div id="backup-list"></div></div></div>
    <div class="modal-overlay" id="modal-dashboard"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">KPI</div></div><div id="dash-val" style="font-size:2rem; font-weight:800; text-align:center; margin-bottom:20px;"></div><div id="dash-prog" style="font-size:2rem; font-weight:800; text-align:center; color:var(--success);"></div></div></div>
    <div class="modal-overlay" id="modal-roles-manager"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">Profili</div></div><div id="roles-list-editor"></div><div class="input-group" style="margin-top:20px;"><label>Nome</label><input type="text" id="new-role-name"></div><div class="input-group"><label>PIN</label><input type="text" id="new-role-pin" maxlength="4"></div><div id="new-role-categories"></div><button class="btn-action" style="background: #f43f5e; color: white; margin-top:20px;" onclick="addRole()">Crea</button></div></div>
    <div class="modal-overlay" id="modal-sede"><div class="modal-box"><div class="input-group"><label>Sede</label><input type="text" id="input-sede-name"></div><button class="btn-action" style="background:var(--primary); color:white;" onclick="saveSede()">Salva</button></div></div>
    <div class="modal-overlay" id="modal-folder"><div class="modal-box"><div class="input-group"><label>Turno</label><input type="text" id="input-folder-name"></div><button class="btn-action" style="background:var(--primary); color:white;" onclick="saveFolder()">Salva</button></div></div>
    <div class="modal-overlay" id="modal-section"><div class="modal-box"><div class="input-group"><label>Frigo</label><input type="text" id="input-section-name"></div><div class="input-group"><label>Reparto</label><select id="input-section-color"></select></div><button class="btn-action" style="background:var(--primary); color:white;" onclick="saveSection()">Salva</button></div></div>
    <div class="modal-overlay" id="modal-category-manager"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">Reparti</div></div><div id="category-list-editor"></div><div class="input-group" style="margin-top:20px;"><label>Nome</label><input type="text" id="new-cat-name"></div><div id="color-palette" style="display:flex; gap:10px; margin-bottom:20px;"></div><div class="input-group"><label>Logica</label><select id="new-cat-type"><option value="standard">Standard</option><option value="magazzino">Magazzino</option></select></div><button class="btn-action" style="background:var(--success); color:white;" onclick="addCategory()">Crea</button></div></div>
    <div class="modal-overlay" id="modal-report"><div class="modal-box"><div class="modal-header"><div class="modal-back-btn" onclick="closeModals()"><i class="fa-solid fa-arrow-left"></i></div><div class="modal-title">Report</div></div><div id="report-preview" style="max-height: 40vh; overflow-y: auto; margin-bottom: 20px;"></div><button class="btn-action" style="background:#25D366; color:white;" onclick="copyReportText()">WhatsApp</button></div></div>

    <script>
        const CLOUD_KEY = "$2a$10$cANUKKt8gusYBU0s1g35UeBKFJM21uWzSe/ugzWuHGeZhj6C7KEui";
        const MASTER_KEY_HASH = "OTk5OQ=="; // 9999
        const PALETTE = ["#0f172a", "#0ea5e9", "#10b981", "#ef4444", "#f59e0b", "#8e44ad", "#fd79a8", "#00ced1"];
        
        let appStructure, appState;
        let activeSede = null, activeFolder = null, activeCatFilter = 'tutti';
        let editMode = false, isFifo = false, showHiddenTimeGated = false, selectedColor = PALETTE[0];
        let currentEdit = {}, activeItemDays = [];
        let activeProfile = localStorage.getItem('cucina_v10_session');
        let tempRoleToUnlock = null;

        function showToast(m, t = 'info') { const c = document.getElementById('toast-container'); const e = document.createElement('div'); e.className = `custom-toast toast-${t}`; e.innerHTML = m; c.appendChild(e); setTimeout(() => e.remove(), 3000); }
        function sanitize(s) { return (s||"").toString().replace(/[<>"]/g,"'").trim(); }
        function generateId() { return Math.random().toString(36).substr(2, 9); }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function initApp() {
            try {
                appState = JSON.parse(localStorage.getItem('cucina_v10_state')) || JSON.parse(localStorage.getItem('cucina_v9_state')) || {};
                
                // DATA RESCUE PROTOCOL
                let rawV10 = localStorage.getItem('cucina_v10_struct');
                let rawV9 = localStorage.getItem('cucina_v9_struct');
                
                if (rawV10) {
                    appStructure = JSON.parse(rawV10);
                } else if (rawV9) {
                    let oldData = JSON.parse(rawV9);
                    const sid = 'sede_1';
                    appStructure = { sedi: { [sid]: { id: sid, name: "SEDE PRINCIPALE", folders: oldData.folders || {}, categories: oldData.categories || [], roles: [] } } };
                    showToast("Dati recuperati da versione precedente", "success");
                } else {
                    const sid = 'sede_1', fid = 'fol_1';
                    appStructure = { sedi: { [sid]: { id: sid, name: "SEDE PRINCIPALE", folders: { [fid]: { id: fid, name: "TURNO UNICO", sections: [] } }, roles: [], categories: [{id:'c1', name:'Generale', color:'#0ea5e9', type:'standard'}] } } };
                }

                // Integrity Check
                Object.values(appStructure.sedi).forEach(s => { 
                    if(!s.categories || s.categories.length===0) s.categories = [{id:'c1', name:'Generale', color:'#0ea5e9', type:'standard'}]; 
                    if(!s.roles) s.roles = []; 
                });

                activeSede = Object.keys(appStructure.sedi)[0];
                activeFolder = activeSede ? Object.keys(appStructure.sedi[activeSede].folders)[0] : null;
                if (localStorage.getItem('cucina_v8_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
                
                saveStructure();
                checkNewDayAndBackup();
                checkAuthentication();
            } catch(e) { console.error(e); alert("Errore caricamento dati"); }
        }

        function saveStructure() { localStorage.setItem('cucina_v10_struct', JSON.stringify(appStructure)); }
        function saveState() { localStorage.setItem('cucina_v10_state', JSON.stringify(appState)); }

        function checkNewDayAndBackup() { 
            const d = new Date().toLocaleDateString(); const bkKey = 'cucina_bkp_' + d.replace(/\//g,'-');
            if (!localStorage.getItem(bkKey)) localStorage.setItem(bkKey, JSON.stringify(appStructure));
            if (localStorage.getItem('cucina_v10_day') !== d) { smartReset(true); localStorage.setItem('cucina_v10_day', d); } 
        }

        function checkAuthentication() {
            if (!activeProfile) { document.getElementById('auth-screen').style.display = 'flex'; renderAuthProfiles(); } 
            else { document.getElementById('auth-screen').style.display = 'none'; applyRolePermissions(); renderApp(); }
        }

        function renderAuthProfiles() {
            const list = document.getElementById('auth-profiles-list'); list.innerHTML = '';
            const roles = appStructure.sedi[activeSede].roles || [];
            roles.forEach(r => { list.innerHTML += `<button class="btn-action" style="background:var(--bg); color:var(--text); border:1px solid var(--border);" onclick="requestProfileLogin('${r.id}')">${r.name}</button>`; });
        }

        function requestManagerLogin() { tempRoleToUnlock = 'admin'; showModal('modal-profile-pin'); }
        function requestProfileLogin(id) { tempRoleToUnlock = id; showModal('modal-profile-pin'); }
        function verifyProfilePin() {
            const pin = document.getElementById('input-profile-pin').value;
            const isM = btoa(pin) === MASTER_KEY_HASH;
            if (tempRoleToUnlock === 'admin') {
                const sPin = localStorage.getItem('cucina_v8_pin');
                if (!sPin) { localStorage.setItem('cucina_v8_pin', pin || '0000'); finalizeLogin('admin'); return; }
                if (pin === sPin || isM) finalizeLogin('admin'); else showToast("PIN Errato", "error");
            } else {
                const r = appStructure.sedi[activeSede].roles.find(x => x.id === tempRoleToUnlock);
                if (r && (r.pin === pin || isM)) finalizeLogin(r.id); else showToast("PIN Errato", "error");
            }
            document.getElementById('input-profile-pin').value = '';
        }

        function finalizeLogin(id) { activeProfile = id; localStorage.setItem('cucina_v10_session', id); closeModals(); checkAuthentication(); }
        function logout() { activeProfile = null; localStorage.removeItem('cucina_v10_session'); location.reload(); }

        function applyRolePermissions() {
            const isM = (activeProfile === 'admin');
            document.querySelectorAll('.manager-only').forEach(el => el.style.display = isM ? 'flex' : 'none');
            document.getElementById('current-user-label').innerText = isM ? "Manager" : "Operatore";
            if (!isM) {
                const r = appStructure.sedi[activeSede].roles.find(x => x.id === activeProfile);
                if (r && r.allowedCats.length > 0) activeCatFilter = r.allowedCats[0];
            } else {
                activeCatFilter = 'tutti'; // Admin default
            }
        }

        function renderApp() { renderSidebar(); renderFolders(); renderCategories(); renderContent(); }
        
        function renderSidebar() { 
            const m = document.getElementById('sedi-menu'); m.innerHTML = ''; 
            Object.values(appStructure.sedi).forEach(s => { m.innerHTML += `<div class="nav-item ${s.id===activeSede?'active':''}" onclick="activeSede='${s.id}'; activeFolder=Object.keys(appStructure.sedi['${s.id}'].folders)[0]; applyRolePermissions(); renderApp();">${s.name}</div>`; }); 
        }
        
        function renderFolders() { 
            const m = document.getElementById('folders-menu'); m.innerHTML = ''; 
            if(!activeSede || !appStructure.sedi[activeSede].folders) return;
            document.getElementById('header-title').innerText = appStructure.sedi[activeSede].name; 
            Object.values(appStructure.sedi[activeSede].folders).forEach(f => { m.innerHTML += `<button class="folder-tab ${f.id===activeFolder?'active':''}" onclick="activeFolder='${f.id}'; renderContent(); renderFolders();">${f.name}</button>`; }); 
        }

        function renderCategories() {
            const m = document.getElementById('categories-filter-menu'); m.innerHTML = '';
            const isM = (activeProfile === 'admin');
            const r = !isM ? appStructure.sedi[activeSede].roles.find(x=>x.id===activeProfile) : null;
            if (isM) m.innerHTML = `<div class="nav-item ${activeCatFilter==='tutti'?'active':''}" onclick="activeCatFilter='tutti'; renderCategories(); renderContent();">Tutti i Reparti</div>`;
            appStructure.sedi[activeSede].categories.forEach(c => { 
                if(!isM && (!r || !r.allowedCats.includes(c.id))) return;
                m.innerHTML += `<div class="nav-item ${activeCatFilter===c.id?'active':''}" onclick="activeCatFilter='${c.id}'; renderCategories(); renderContent();"><i class="fa-solid fa-circle" style="color:${c.color}"></i> ${c.name}</div>`; 
            });
        }

        function toggleHiddenItems() { showHiddenTimeGated = !showHiddenTimeGated; document.getElementById('btn-show-hidden').style.background = showHiddenTimeGated ? 'var(--warning)' : 'var(--bg)'; renderContent(); }

        // FILTER AND SCROLL FIX
        function renderContent() {
            const cont = document.getElementById('main-content'); cont.innerHTML = ''; 
            const query = document.getElementById('search-input').value.toLowerCase().trim(); 
            if(!activeSede || !activeFolder || !appStructure.sedi[activeSede].folders[activeFolder]) return;
            const f = appStructure.sedi[activeSede].folders[activeFolder];
            const day = new Date().getDay(); 
            
            f.sections.forEach(sec => {
                let items = sec.items.filter(i => { 
                    const mCat = activeCatFilter === 'tutti' || i.catId === activeCatFilter; 
                    const mSearch = query === '' || i.n.toLowerCase().includes(query); 
                    const isT = !i.days || i.days.length === 0 || i.days.includes(day);
                    const mTime = editMode || showHiddenTimeGated || isT;
                    return mCat && mSearch && mTime; 
                });
                if(items.length === 0 && !editMode) return;

                const c = document.createElement('div'); c.className = 'card';
                let h = `<div class="card-header" style="background:${sec.color}"><span>${sec.name}</span>${editMode?`<i class="fa-solid fa-pen" onclick="openSectionModal('${sec.id}')"></i>`:''}</div><div class="table-container"><table>`;
                items.forEach(i => {
                    const k = `${activeSede}_${activeFolder}_${sec.id}_${i.id}`, st = appState[k] || {c:false, n:'', q:0};
                    const cat = appStructure.sedi[activeSede].categories.find(x => x.id === i.catId) || {color:'#ccc', name:'-', type:'standard'};
                    const isOut = !editMode && i.days && i.days.length > 0 && !i.days.includes(day);

                    let act = cat.type==='magazzino' ? `<div style="display:flex;gap:8px;"><button class="btn-action" style="padding:10px;width:auto;" onclick="updateQty('${k}',-1)">-</button><b>${st.q||0}</b><button class="btn-action" style="padding:10px;width:auto;" onclick="updateQty('${k}',1)">+</button></div>` : `<div class="chk-btn ${st.c?'checked':''}" onclick="toggleCheck('${k}')">✓</div>`;

                    h += `<tr class="${st.c?'is-done':''} ${isOut?'out-of-schedule':''}">
                        <td><b class="prod-name">${i.n}</b><span class="role-badge" style="background:${cat.color}">${cat.name}</span> ${isOut?'<span style="color:var(--warning)">EXTRA</span>':''}${editMode?`<i class="fa-solid fa-pen" style="margin-left:10px;" onclick="openItemModal('${sec.id}','${i.id}')"></i>`:''}</td>
                        <td><input type="text" class="note-input" value="${st.n}" onblur="updateState('${k}','n',this.value)"></td>
                        <td>${act}</td>
                    </tr>`;
                });
                h += `</table></div>`;
                if(editMode) h += `<button class="btn-action" style="background:transparent; color:var(--accent);" onclick="openItemModal('${sec.id}')">+ AGGIUNGI</button>`;
                c.innerHTML = h; cont.appendChild(c);
            });
            if(editMode) { const btn = document.createElement('button'); btn.className='btn-action'; btn.style.background='var(--success)'; btn.style.color='#fff'; btn.innerText='+ NUOVA CELLA / FRIGO'; btn.onclick=openSectionModal; cont.appendChild(btn); }
        }

        function toggleCheck(k) { appState[k]=appState[k]||{c:false,n:'',q:0}; appState[k].c=!appState[k].c; saveState(); renderContent(); }
        function updateState(k,f,v) { appState[k]=appState[k]||{c:false,n:'',q:0}; appState[k][f]=v; saveState(); }
        function updateQty(k,a) { appState[k]=appState[k]||{c:false,n:'',q:0}; appState[k].q=Math.max(0,(appState[k].q||0)+a); saveState(); renderContent(); }
        function smartReset(auto=false) { if(auto || confirm("Resettare spunte?")) { for(let k in appState) { appState[k].c=false; appState[k].n=''; } saveState(); renderContent(); } }

        function toggleItemFields() { const cId = document.getElementById('input-item-cat').value; const c = appStructure.sedi[activeSede].categories.find(x => x.id === cId); if(c && c.type === 'magazzino') { document.getElementById('wrapper-ideal').style.display='block'; document.getElementById('wrapper-ls').style.display='none'; } else { document.getElementById('wrapper-ideal').style.display='none'; document.getElementById('wrapper-ls').style.display='flex'; } }
        function toggleDay(el) { const d = parseInt(el.dataset.day); el.classList.toggle('active'); if(activeItemDays.includes(d)) activeItemDays=activeItemDays.filter(x=>x!==d); else activeItemDays.push(d); }
        function openItemModal(sid, itemId=null) {
            currentEdit = {sid, itemId}; activeItemDays = [];
            const sel = document.getElementById('input-item-cat'); sel.innerHTML = '';
            appStructure.sedi[activeSede].categories.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
            document.querySelectorAll('.day-chip').forEach(d => d.classList.remove('active'));
            if(itemId) {
                const i = appStructure.sedi[activeSede].folders[activeFolder].sections.find(s=>s.id===sid).items.find(x=>x.id===itemId);
                document.getElementById('input-item-name').value = i.n; activeItemDays = i.days || [];
                activeItemDays.forEach(d => document.querySelector(`.day-chip[data-day="${d}"]`).classList.add('active'));
            } else { document.getElementById('input-item-name').value = ''; }
            toggleItemFields(); showModal('modal-item');
        }
        function saveItem() {
            const n = document.getElementById('input-item-name').value; if(!n) return;
            const sec = appStructure.sedi[activeSede].folders[activeFolder].sections.find(s => s.id === currentEdit.sid);
            const item = {id:currentEdit.itemId || 'i_'+generateId(), n, catId:document.getElementById('input-item-cat').value, days:activeItemDays, l:document.getElementById('input-item-line').value, s:document.getElementById('input-item-stock').value, idealQty:parseFloat(document.getElementById('input-item-ideal').value)||0};
            if(currentEdit.itemId) { const idx = sec.items.findIndex(x=>x.id===currentEdit.itemId); sec.items[idx]=item; } else sec.items.push(item);
            saveStructure(); closeModals(); renderContent();
        }

        function openSectionModal(id=null) { currentEdit={id}; const sel = document.getElementById('input-section-color'); sel.innerHTML = ''; appStructure.sedi[activeSede].categories.forEach(c => sel.innerHTML += `<option value="${c.color}">${c.name}</option>`); if(id){ const s = appStructure.sedi[activeSede].folders[activeFolder].sections.find(x=>x.id===id); document.getElementById('input-section-name').value=s.name; sel.value=s.color; } else { document.getElementById('input-section-name').value=''; } showModal('modal-section'); }
        function saveSection() { const n = document.getElementById('input-section-name').value, c = document.getElementById('input-section-color').value; if(!n) return; let arr = appStructure.sedi[activeSede].folders[activeFolder].sections; if(currentEdit.id){ let s=arr.find(x=>x.id===currentEdit.id); s.name=n; s.color=c; } else arr.push({id:'s_'+generateId(), name:n, color:c, items:[]}); saveStructure(); closeModals(); renderContent(); }
        
        function requestEditMode() { editMode = !editMode; document.body.classList.toggle('edit-mode', editMode); document.querySelectorAll('.edit-only').forEach(e => e.style.display = editMode ? 'flex' : 'none'); renderApp(); }
        function toggleTheme() { const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('cucina_v8_theme', t); }
        function toggleFIFO() { isFifo = !isFifo; renderContent(); }

        window.onload = initApp;
    </script>
</body>
</html>
